# ============================================================
# Docker Compose — Full Agent Stack
#
# Services:
#   1. agent    — FastAPI AI agent (2 replicas)
#   2. redis    — Cache cho session và rate limiting
#   3. qdrant   — Vector database cho RAG
#   4. nginx    — Reverse proxy, load balancer
#
# Chạy: docker compose up
# Test:  curl http://localhost/health
# Stop:  docker compose down
# ============================================================

version: "3.9"

services:

  # ──────────────────────────────────────
  # Agent Service
  # ──────────────────────────────────────
  agent:
    build:
      context: ../..
      dockerfile: 02-docker/production/Dockerfile
      target: runtime          # chỉ build stage "runtime", không build "builder"
    env_file:
      - ../../.env.local
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-staging}
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - CHATBOT_MOCK_ONLY=${CHATBOT_MOCK_ONLY:-false}
      - CHATBOT_ALLOW_MOCK_FALLBACK=${CHATBOT_ALLOW_MOCK_FALLBACK:-false}
      - CHATBOT_DEFAULT_PROVIDER=${CHATBOT_DEFAULT_PROVIDER:-custom}
      # ❌ KHÔNG đặt secrets trực tiếp ở đây trong production
      # ✅ Dùng: docker secret hoặc env file ngoài git
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Không expose port trực tiếp — dùng qua Nginx
    networks:
      - internal

  # ──────────────────────────────────────
  # Redis — Session cache & Rate limiting
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ──────────────────────────────────────
  # Qdrant — Vector database
  # ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal

  # ──────────────────────────────────────
  # Nginx — Reverse proxy & Load balancer
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"    # HTTP demo port trên host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - internal

# ──────────────────────────────────────
# Volumes — persistent data
# ──────────────────────────────────────
volumes:
  redis_data:
  qdrant_data:

# ──────────────────────────────────────
# Network — isolate internal traffic
# ──────────────────────────────────────
networks:
  internal:
    driver: bridge
