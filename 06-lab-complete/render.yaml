services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "2.0.0"
      - key: CHATBOT_DEFAULT_PROVIDER
        value: custom
      - key: CUSTOM_PROVIDER_MODEL
        value: qwen3-coder-480b-a35b-instruct
      - key: CHATBOT_MOCK_ONLY
        value: "false"
      - key: CHATBOT_ALLOW_MOCK_FALLBACK
        value: "true"
      - key: SHOPAIKEY_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
