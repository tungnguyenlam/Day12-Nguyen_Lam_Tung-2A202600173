# ============================================================
# cloudbuild.yaml — Google Cloud Build CI/CD Pipeline
#
# Trigger: tự động chạy khi push lên main branch
# Steps: test → build Docker image → push → deploy to Cloud Run
#
# Setup:
#   gcloud builds submit --config cloudbuild.yaml .
# ============================================================

steps:
  # ──────────────────────────────────────
  # Step 1: Smoke test shared app
  # ──────────────────────────────────────
  - name: python:3.11-slim
    id: smoke
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt
        python -m compileall utils cloud_app.py 02-docker/production/main.py
        python -c "from cloud_app import app; print(app.title)"
        echo "Shared cloud app loaded successfully"

  # ──────────────────────────────────────
  # Step 2: Build Docker image
  # ──────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -f
      - 02-docker/production/Dockerfile
      - --tag=gcr.io/$PROJECT_ID/ai-agent:$COMMIT_SHA
      - --tag=gcr.io/$PROJECT_ID/ai-agent:latest
      - --cache-from=gcr.io/$PROJECT_ID/ai-agent:latest   # Layer cache
      - .
    waitFor: [smoke]

  # ──────────────────────────────────────
  # Step 3: Push to Container Registry
  # ──────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/ai-agent
    waitFor: [build]

  # ──────────────────────────────────────
  # Step 4: Deploy to Cloud Run
  # ──────────────────────────────────────
  - name: gcr.io/cloud-builders/gcloud
    id: deploy
    args:
      - run
      - deploy
      - ai-agent
      - --image=gcr.io/$PROJECT_ID/ai-agent:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --allow-unauthenticated       # Public endpoint
      - --min-instances=1             # Tránh cold start
      - --max-instances=10            # Giới hạn scale
      - --memory=512Mi
      - --cpu=1
      - --timeout=60s
      - --set-env-vars=ENVIRONMENT=production,CHATBOT_DEFAULT_PROVIDER=custom,CUSTOM_PROVIDER_MODEL=qwen3-coder-480b-a35b-instruct,CHATBOT_MOCK_ONLY=false,CHATBOT_ALLOW_MOCK_FALLBACK=false
      - --set-secrets=SHOPAIKEY_API_KEY=shopaikey-api-key:latest
    waitFor: [push]

# ──────────────────────────────────────
# Build options
# ──────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

# ──────────────────────────────────────
# Build timeout
# ──────────────────────────────────────
timeout: 1200s  # 20 phút max
