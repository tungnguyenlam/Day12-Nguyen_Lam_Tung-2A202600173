# ============================================================
# railway.toml — Railway deployment configuration
#
# Docs: https://docs.railway.com/reference/config-as-code
# ============================================================

[build]
# Deploy từ repo root bằng Nixpacks.
# requirements.txt ở root sẽ cài cùng dependencies với 02-docker/production.
builder = "NIXPACKS"

[deploy]
# Dùng cùng app với 02-docker/production qua cloud_app.py
startCommand = "uvicorn cloud_app:app --host 0.0.0.0 --port $PORT"

# Health check — Railway restart nếu fail
healthcheckPath = "/health"
healthcheckTimeout = 30

# Tự động restart khi crash
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ============================================================
# Environment variables đặt qua Railway Dashboard hoặc CLI:
#   railway variables set SHOPAIKEY_API_KEY=sk-...
#   railway variables set CUSTOM_PROVIDER_MODEL=qwen3-coder-480b-a35b-instruct
#   railway variables set CHATBOT_DEFAULT_PROVIDER=custom
#   railway variables set CHATBOT_MOCK_ONLY=false
#   railway variables set ENVIRONMENT=production
# ============================================================
